<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naval AAW Tactical Display</title>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
    }
    #sidebar-header {
      padding: 16px;
      background: #16213e;
      border-bottom: 1px solid #333;
    }
    #sidebar-header h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    #sidebar-header .subtitle {
      font-size: 12px;
      color: #888;
    }
    #track-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .track-item {
      padding: 10px 12px;
      margin-bottom: 4px;
      background: #252545;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }
    .track-item:hover {
      background: #2d2d5a;
    }
    .track-item.selected {
      background: #3d3d7a;
      border: 1px solid #5a5aaa;
    }
    .track-item .track-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }
    .track-item .track-info {
      flex: 1;
      min-width: 0;
    }
    .track-item .track-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-item .track-type {
      font-size: 11px;
      color: #888;
    }
    #main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    #toolbar {
      height: 48px;
      background: #16213e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      border-bottom: 1px solid #333;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar-group:not(:last-child) {
      padding-right: 12px;
      border-right: 1px solid #333;
    }
    .toolbar-label {
      font-size: 12px;
      color: #888;
    }
    .toolbar-btn {
      padding: 6px 12px;
      background: #252545;
      border: 1px solid #444;
      color: #eee;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .toolbar-btn:hover {
      background: #2d2d5a;
      border-color: #5a5aaa;
    }
    .toolbar-btn.active {
      background: #3d3d7a;
      border-color: #7a7aba;
    }
    .toolbar-btn.primary {
      background: #2e7d32;
      border-color: #388e3c;
    }
    .toolbar-btn.primary:hover {
      background: #388e3c;
    }
    #timeline-display {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #4fc3f7;
      min-width: 60px;
    }
    #projection-select {
      padding: 6px 10px;
      background: #252545;
      border: 1px solid #444;
      color: #eee;
      border-radius: 4px;
      font-size: 13px;
    }
    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #map2d, #map3d {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #map2d {
      z-index: 1;
    }
    #map3d {
      display: none;
      z-index: 2;
      pointer-events: none;
    }
    #map3d.active {
      display: block;
      pointer-events: auto !important;
    }
    #map3d.active .cesium-widget,
    #map3d.active .cesium-widget canvas {
      pointer-events: auto !important;
    }
    #coordinate-readout {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(22, 33, 62, 0.9);
      color: #4fc3f7;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }
    #cesium-container {
      width: 100%;
      height: 100%;
    }
    .cesium-viewer-bottom {
      display: none !important;
    }
    #map3d {
      pointer-events: auto !important;
    }
    .cesium-widget {
      pointer-events: auto !important;
    }
    .cesium-widget canvas {
      pointer-events: auto !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <h1>Taiwan Strait Scenario</h1>
        <div class="subtitle">Naval AAW Tactical Display</div>
      </div>
      <div id="track-list"></div>
    </div>
    <div id="main-container">
      <div id="toolbar">
        <div class="toolbar-group">
          <span class="toolbar-label">View:</span>
          <button id="btn-view-2d" class="toolbar-btn active">2D</button>
          <button id="btn-view-3d" class="toolbar-btn">3D</button>
        </div>
        <div class="toolbar-group" id="projection-group">
          <span class="toolbar-label">Projection:</span>
          <select id="projection-select">
            <option value="EPSG:3857">Web Mercator</option>
            <option value="EPSG:4326">WGS84</option>
            <option value="EPSG:32651">UTM Zone 51</option>
          </select>
        </div>
        <div class="toolbar-group">
          <button id="btn-reset" class="toolbar-btn">Reset</button>
          <button id="btn-play" class="toolbar-btn primary">Play</button>
          <span id="timeline-display">00:00</span>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">Aircraft:</span>
          <span id="aircraft-count" style="color: #4fc3f7; font-family: 'Courier New', monospace; font-size: 13px;">● 0</span>
          <select id="aircraft-limit" style="padding: 4px 8px; background: #252545; border: 1px solid #444; color: #eee; border-radius: 4px; font-size: 12px;">
            <option value="100">100</option>
            <option value="300">300</option>
            <option value="500">500</option>
            <option value="1000" selected>1000</option>
            <option value="1500">1500</option>
          </select>
        </div>
        <div class="toolbar-group">
          <button id="btn-diagnostics" class="toolbar-btn">Diagnostics</button>
        </div>
      </div>
      <div id="map-container">
        <div id="map2d"></div>
        <div id="map3d"></div>
        <div id="coordinate-readout">Lat: 0.000° Lon: 0.000°</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
